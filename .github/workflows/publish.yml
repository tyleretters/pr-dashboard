name: Publish to npm

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      # npm >= 11.5.1 is required for Trusted Publishing (OIDC).
      # setup-node with Node 24 ships a compatible version, but pin explicitly.
      - run: npm install --global npm@latest
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      # No NODE_AUTH_TOKEN needed — Trusted Publishing uses the GitHub OIDC
      # token via id-token: write permission above. npm verifies the publish
      # is coming from this repo's publish.yml on a tag matching v*.
      - run: npm publish --provenance --access public
